linters:
  enable-all: false
  enable:
    - bodyclose
    - copyloopvar
    - dupl
    - goconst
    - gocritic
    - gocyclo
    - gofmt
    - misspell
    - nakedret
    - prealloc
    - staticcheck
    - unconvert
    - unparam

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gocyclo
        - unparam

linters-settings:
  gofmt:
    simplify: true
  goconst:
    ignore-tests: true
  gocyclo:
    min-complexity: 30
